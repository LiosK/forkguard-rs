name: Rust

on:
  workflow_dispatch:
  push:
    branches: [ "wf-test" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test-ubuntu:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Run tests
      run: cargo test --verbose
    - name: Run tests
      run: cargo test --verbose --features atfork
